<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rolling-Frogger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
    #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    #offline-warning {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      background: #ff4444; color: #fff;
      text-align: center; padding: 12px;
      font-family: Arial, sans-serif; font-size: 14px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="offline-warning">Phaser failed to load. Check your internet connection and reload.</div>
  <div id="game-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.85.0/dist/phaser.min.js"></script>
  <script src="js/data/lanes.js"></script>
  <script src="js/data/vehicles.js"></script>
  <script src="js/utils/content-loader.js"></script>
  <script src="js/utils/asset-manifest.js"></script>
  <script src="js/scenes/boot.js"></script>
  <script src="js/scenes/menu.js"></script>
  <script src="js/systems/game-config.js"></script>
  <script src="js/systems/traffic-spawner.js"></script>
  <script src="js/systems/player-controller.js"></script>
  <script src="js/systems/collision-manager.js"></script>
  <script src="js/systems/score-manager.js"></script>
  <script src="js/systems/lane-renderer.js"></script>
  <script src="js/systems/hud-renderer.js"></script>
  <script src="js/entities/floating-entity.js"></script>
  <script src="js/entities/goal-bay.js"></script>
  <script src="js/systems/river-manager.js"></script>
  <script src="js/systems/goal-manager.js"></script>
  <script src="js/scenes/game.js"></script>
  <script src="js/scenes/gameover.js"></script>
  <script src="js/game.js"></script>
  <script>
    (function() {
      if (typeof Phaser === 'undefined') {
        var warn = document.getElementById('offline-warning');
        if (warn) warn.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
